<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #202124;
      --text-secondary: #5f6368;
      --search-border: #dfe1e5;
      --search-hover-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
      --shortcut-bg: #f1f3f4;
      --shortcut-hover: #e8eaed;
      --link-color: #70757a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Roboto', Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Top Navigation (Fake) */
    .top-nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 15px 20px;
      gap: 15px;
      font-size: 13px;
    }

    .top-nav a {
      color: var(--text-color);
      text-decoration: none;
    }

    .top-nav a:hover {
      text-decoration: underline;
    }

    .app-icon {
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
    }

    .profile-icon {
      width: 32px;
      height: 32px;
      background-color: #1a73e8;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
    }

    /* Main Content */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 10vh;
      padding: 20px;
    }

    .logo-container {
      margin-bottom: 30px;
    }

    .logo-container img {
      width: 272px;
      height: 92px;
      object-fit: contain;
    }

    /* Search Box */
    .search-card {
      width: 100%;
      max-width: 584px;
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      align-items: center;
      width: 100%;
      height: 46px;
      background: #fff;
      border: 1px solid var(--search-border);
      border-radius: 24px;
      padding: 0 14px 0 14px;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .search-box:hover, .search-box:focus-within {
      box-shadow: var(--search-hover-shadow);
      border-color: transparent;
    }

    .search-icon {
      color: #9aa0a6;
      font-size: 14px;
      margin-right: 12px;
      margin-left: 4px;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      color: var(--text-color);
      background: transparent;
    }

    /* Hidden Engine Select to preserve your proxy logic */
    #engine {
      display: none;
    }

    /* Shortcuts */
    .shortcuts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      max-width: 480px;
      margin: 0 auto;
    }

    @media (min-width: 600px) {
      .shortcuts {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
      padding: 10px;
      border-radius: 8px;
      transition: background-color 0.2s;
    }

    .shortcut:hover {
      background-color: var(--shortcut-hover);
    }

    .shortcut-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: var(--shortcut-bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shortcut-icon img {
      width: 24px;
      height: 24px;
    }

    .shortcut-icon i {
      color: var(--text-color);
      font-size: 20px;
    }

    .shortcut-label {
      font-size: 12px;
      color: var(--text-color);
      text-align: center;
      max-width: 60px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Footer */
    footer {
      background-color: #f2f2f2;
      color: var(--link-color);
      font-size: 14px;
    }

    .footer-top {
      padding: 15px 30px;
      border-bottom: 1px solid #dadce0;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .footer-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: var(--link-color);
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    /* Loader */
    .loader {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .loader.show { display: flex; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f3f3f3;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div class="loader" id="loader"><div class="spinner"></div></div>

  <div class="top-nav">
    <a href="#">Gmail</a>
    <a href="#">Images</a>
    <i class="fa-solid fa-bars app-icon"></i>
    <div class="profile-icon">U</div>
  </div>

  <div class="main-container">
    <div class="logo-container">
      <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google">
    </div>

    <div class="search-card">
      <form class="search-box" id="searchForm">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="searchInput" title="Search" autocomplete="off" autofocus>
        <select id="engine">
          <option value="https://www.google.com/search?q=">Google</option>
          <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
          <option value="https://search.brave.com/search?q=">Brave</option>
        </select>
      </form>
    </div>

    <div class="shortcuts" id="shortcuts">

      <a class="shortcut" data-url="https://youtube.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" style="filter: brightness(0) saturate(100%) invert(27%) sepia(87%) saturate(5412%) hue-rotate(345deg) brightness(98%) contrast(105%);"></div>
        <span class="shortcut-label">YouTube</span>
      </a>

      <a class="shortcut" data-url="https://discord.com">
        <div class="shortcut-icon"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg" style="filter: brightness(0) saturate(100%) invert(35%) sepia(83%) saturate(1915%) hue-rotate(218deg) brightness(101%) contrast(96%);"></div>
        <span class="shortcut-label">Discord</span>
      </a>

      <div class="shortcut" id="addShortcut">
        <div class="shortcut-icon"><i class="fa-solid fa-plus"></i></div>
        <span class="shortcut-label">Add shortcut</span>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-top">
      United States
    </div>
    <div class="footer-bottom">
      <div class="footer-links">
        <a href="#">About</a>
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
      </div>
      <div class="footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#" id="resetDataBtn">Settings</a> </div>
    </div>
  </footer>

  <script>
    const $ = s => document.querySelector(s);

    // Kept your reset logic, attached to the fake "Settings" button
    $('#resetDataBtn').onclick = (e) => {
      e.preventDefault();
      if (confirm("Reset shortcut data?")) {
        localStorage.clear();
        location.reload();
      }
    };

    // Kept your proxy navigation logic
    const nav = url => {
      $('#loader').classList.add('show');
      window.parent?.postMessage({ type: 'navigate', url }, '*');
    };

    // Kept your search logic
    $('#searchForm').onsubmit = e => {
      e.preventDefault();
      const q = $('#searchInput').value.trim();
      if (q) nav($('#engine').value + encodeURIComponent(q));
    };

    // Kept your dynamic shortcut logic
    $('#shortcuts').onclick = e => {
      const shortcut = e.target.closest('.shortcut');
      if (!shortcut) return;

      if (shortcut.id === 'addShortcut') {
        const name = prompt("Name:");
        if (!name) return;
        let url = prompt("URL:");
        if (!url) return;
        if (!url.startsWith('http') && !url.startsWith('/')) url = 'https://' + url;

        const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
        shortcuts.push({ name, url });
        localStorage.setItem('shortcuts', JSON.stringify(shortcuts));
        renderCustom();
      } else {
        const url = shortcut.dataset.url;
        if (url) {
          e.preventDefault();
          nav(url);
        }
      }
    };

    // Kept your custom shortcut rendering logic
    function renderCustom() {
      document.querySelectorAll('.custom-shortcut').forEach(e => e.remove());
      const shortcuts = JSON.parse(localStorage.getItem('shortcuts') || '[]');
      shortcuts.forEach(s => {
        const div = document.createElement('a');
        div.className = 'shortcut custom-shortcut';
        div.dataset.url = s.url;
        // Generate an initial letter for the icon if no image is provided
        const initial = s.name.charAt(0).toUpperCase();
        div.innerHTML = `<div class="shortcut-icon"><strong>${initial}</strong></div><span class="shortcut-label">${s.name}</span>`;
        $('#addShortcut').before(div);
      });
    }

    renderCustom();
  </script>
</body>
</html>
