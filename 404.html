<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Lost in Space</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #1a1a20;
      --bg-end: #0d0d12;
      --accent: #e2c044;
      --text: #fdfdfd;
      --text-soft: #a1a1aa;
      --panel-bg: rgba(30, 30, 36, 0.6);
      --border: rgba(255, 255, 255, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      overflow: hidden;
      background-color: var(--bg-end);
    }

    /* Background Gradient */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, var(--bg-start), var(--bg-end) 80%);
      z-index: -2;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: -1;
    }

    .error-container {
      text-align: center;
      z-index: 10;
      padding: 40px;
    }

    .error-code {
      font-size: clamp(8rem, 20vw, 12rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0;
      background: linear-gradient(to bottom, #fff, var(--text-soft));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      animation: float 6s ease-in-out infinite;
    }

    /* Glitch Effect */
    .error-code::after {
      content: "404";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      -webkit-text-fill-color: var(--accent);
      opacity: 0.3;
      z-index: -1;
      animation: glitch 4s infinite;
    }

    .message {
      font-size: 1.5rem;
      color: var(--text-soft);
      margin-bottom: 2rem;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 32px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      border-radius: 16px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .home-btn:hover {
      background: var(--accent);
      color: var(--bg-end);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(226, 192, 68, 0.2);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }


  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="error-container">
    <h1 class="error-code">404</h1>
    <p class="message">Oh no! This page doesn't exist.</p>
    <a href="index.html" class="home-btn">
      <i class="fa-solid fa-house"></i>
      Back to Lobby
    </a>
  </div>

  <script>
    // Particle System (Flint Style)
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.onresize = resize;
    resize();

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.3;
        this.alpha = Math.random() * 0.5;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < 80; i++) particles.push(new Particle());

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
