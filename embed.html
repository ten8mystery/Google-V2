<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flint</title>

<script src="https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js"></script>

<script type="module">
import * as BareMux from "https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux/dist/index.mjs";
window.BareMux = BareMux;
</script>

<script src="./script.js" defer></script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
overflow:hidden;
background:transparent;
font-family:Inter,Arial,sans-serif;
}

#app{
width:100vw;
height:100vh;
}

.tabs,
.nav,
.loading-bar-container{
display:none !important;
}

.browser-container,
.iframe-container{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

iframe{
border:none;
width:100%;
height:100%;
background:transparent;
}

.hidden{
display:none !important;
}

.message-container{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:transparent;
color:#fff;
z-index:50;
pointer-events:none;
}

.message-content{
text-align:center;
max-width:500px;
padding:30px;
pointer-events:auto;
}

#loading-title{
font-size:26px;
font-weight:600;
margin-bottom:10px;
}

#loading-url{
font-size:14px;
opacity:.7;
margin-bottom:25px;
word-break:break-all;
}

.spinner{
width:44px;
height:44px;
border:4px solid rgba(255,255,255,.2);
border-top:4px solid #fff;
border-radius:50%;
margin:0 auto 20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#skip-btn{
display:none;
margin-top:10px;
padding:10px 18px;
font-size:14px;
border-radius:6px;
border:none;
background:#ffffff10;
color:#fff;
cursor:pointer;
transition:.2s;
}

#skip-btn:hover{
background:#ffffff25;
}
</style>

</head>

<body>

<div id="app"></div>

</body>
</html>
